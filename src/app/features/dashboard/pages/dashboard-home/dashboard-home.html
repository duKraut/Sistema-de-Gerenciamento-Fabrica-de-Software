        <i class="ph ph-plus"></i>
        Novo Ativo
    </button>
</div>

<div class="stats-grid">

    title="Itens em Estoque" 
    value="12.450" 
    badgeText="+2.4%" 
    badgeType="success" 
    iconClass="ph-fill ph-archive-box">

  <app-stat-card 
    title="Alertas de Estoque Baixo" 
    value="18" 
    badgeText="+12%" 
    badgeType="danger" 
    iconClass="ph-fill ph-warning">

  <app-stat-card 
    title="Valor do Patrimônio" 
    value="R$ 2.4M" 
    badgeText="+0.8%" 
    badgeType="success" 
    iconClass="ph-fill ph-currency-dollar">
  </app-stat-card>

  <app-stat-card 
    title="Ativos em Manutenção" 
    value="12" 
    badgeText="Estável" 
    badgeType="neutral" 
    iconClass="ph-fill ph-wrench">

        <span class="legend-item"><span class="dot blue"></span> Consumo</span>

      </div>

<div class="card actions-section">

    <h3>Ações Críticas</h3>

  </div>
  
  <app-action-list></app-action-list>

  <button class="btn-outline" style="width: 100%; margin-top: 16px; padding: 12px; background: transparent; border: 1px solid #cbd5e1; color: #1a56db; font-weight: 600; border-radius: 8px; cursor: pointer;">
